            <h2>はじめに</h2>
<p>前回の記事では、SVNからGit/GitLabへの移行によって得られるメリットや、SVN運用における課題を整理しました。
今回はその続編として、実際に<strong>Git/GitLabへ移行する際に選択肢となる具体的な手法やツール、そしてその使用上の考慮事項や留意点について詳しく解説します。</strong></p>
<p>移行にあたっては、SVNの履歴をGit形式に変換するためのツールとして<code>git-svn</code>が広く利用されています。このツールを用いることでSVNリポジトリのコミット履歴を変換し、移行後のGitからも過去の履歴を参照可能とします。</p>
<h2>移行作業前の準備事項</h2>
<p>履歴の返還作業前に必要な作業や検討事項を記載します。</p>
<h3>1. SVNリポジトリレイアウトを確認する</h3>
<p>移行元のリポジトリレイアウトを把握し、Gitリポジトリの最適な構成を決定します。</p>
<ul>
<li>標準レイアウト(trunk／branches／tags)の場合は、<code>git-svn</code>の追加設定不要で移行可能です。</li>
<li>カスタムレイアウト/モノリポの場合は、パスのマッピング等を決める必要があります。
併せて、移行後の Git リポジトリ上でどのようなプロジェクト構成（単一リポジトリ vs 複数リポジトリ、グループ階層など）を採用するかを決めます。</li>
</ul>
<div class="note"><p>カスタムレイアウトではパス指定の誤りが移行ミスにつながるため、事前の移行検証をお勧めします。</p>
</div><h3>2. 移行対象の決定</h3>
<p>リポジトリの規模と操作性を両立させるため、移行対象とするブランチや履歴、ファイルを決めます。</p>
<ul>
<li>
<p><strong>ブランチ／タグ</strong></p>
<ul>
<li>更新頻度が低いブランチは、アーカイブ用リポジトリへ移行または除外を検討します。</li>
<li>リリースを示すタグは、今後のバグ／サポート参照用として最新数個を移行すること等を検討します。</li>
</ul>
</li>
<li>
<p><strong>ディレクトリ／ファイル</strong></p>
<ul>
<li>バイナリファイルは除外し、必要に応じて Git LFS で管理することを検討します。</li>
<li>Excel／Word などファイルロックが必要なドキュメントは、別途ファイルサーバーや文書管理ツールでの管理を検討します。</li>
</ul>
</li>
<li>
<p><strong>履歴情報</strong><br>
大規模リポジトリでは全履歴を移行するとリポジトリサイズが肥大化し、操作性が低下する可能性があります。</p>
<ul>
<li>直近数年分の履歴のみを移行することを検討します。</li>
<li>過去の履歴はアーカイブ用リポジトリに保管することを検討します。</li>
</ul>
</li>
</ul>
<div class="note"><p>不要データをGitへ取り込むとリポジトリが肥大化し操作性が低下します。
移行対象の厳選と事前検証をお勧めします。</p>
</div><h3>3. バイナリファイルの存在有無</h3>
<p>大容量バイナリファイルや頻繁に更新・参照されるバイナリは Git LFS で管理し、本体リポジトリにはポインタのみを保持します。</p>
<div class="note note--warn"><p>本体リポジトリで大容量バイナリを管理すると、サイズ増大に伴いクローン／フェッチ速度が著しく低下します。
プロジェクト要件に応じて最適な運用方法を確立してください。</p>
</div><h3>4. SVNの外部参照/内部参照の扱いの検討</h3>
<p>SVN の <code>svn:externals</code> は、別リポジトリや別ディレクトリを参照する仕組みですが、<code>git-svn</code> のデフォルト移行では “プロパティ情報のみ” が取り込まれ、実体ファイルは取得されません。移行後に中身のないディレクトリが残るリスクがあります。そのため、外部参照の場合は同一リポジトリへの統合や別リポジトリ化等を検討してください。内部参照の場合は事前にSVNの<code>svn:externals</code>を解除し実ファイルをコミットする等を検討してください。</p>
<div class="note"><p>どちらの参照もデフォルト移行では実体を取得できないため、事前に方針を決定し移行手順に組み込むことが重要です。
外部参照は依存先の更新フロー、内部参照は参照先の正確なパス構造を整理したうえで移行を行う必要があります。</p>
</div><h3>5. SVNの空フォルダの存在有無</h3>
<p>Git は空のフォルダを管理対象としないため、SVN上の空フォルダを移行する必要がある場合は、<br>
<code>.gitkeep</code>ファイルを追加し明示的にコミットします。</p>
<div class="note"><p>Gitではコミットごとに「Author Name」と「Author Email」を必ず記録します。
そのためgit-svnで履歴を引き継ぐ際にSVNのユーザ名からGitのユーザ名、メールアドレスへのマッピングが必要になります。</p>
</div><h2>移行作業</h2>
<h3>1. オーサー(author)情報の作成</h3>

以下にマッピング用のauthors.txtを作成するスクリプトを記載します。</p>

  <script>
    // 1) クリップボードコピー関数（モダン＆フォールバック両対応）
    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand('copy');
        return Promise.resolve();
      } catch (e) {
        return Promise.reject(e);
      } finally {
        document.body.removeChild(ta);
      }
    }

    // 2) シャドウルート内外を問わずコピーアイコンを検出できるように
    const host = document.querySelector('#blog-root');
    const root = host.shadowRoot || document;
    root.addEventListener('click', e => {
      const btn = e.composedPath().find(el =>
        el instanceof Element && el.classList.contains('copy-btn')
      );
      if (!btn) return;
      const codeEl = btn.parentElement.querySelector('code');
      copyToClipboard(codeEl.innerText)
        .then(() => {
          btn.textContent = '✓ コピーしました';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '🗐';
          }, 2000);
        })
        .catch(() => {
          btn.textContent = 'コピー失敗';
          setTimeout(() => btn.innerHTML = '🗐', 2000);
        });
    });

    <!-- クリック→拡大・ダウンロード機能 -->
    window.addEventListener('DOMContentLoaded', () => {
      // 1) Shadow DOM があるかチェック、なければ document を使う
      const host = document.querySelector('#blog-root');
      const root = (host && host.shadowRoot) ? host.shadowRoot : document;
      const modal = document.getElementById('image-modal');
      const modalImg = document.getElementById('modal-img');
      const downloadBtn = document.getElementById('download-btn');

      // 2) 画像要素にバインド
      root.querySelectorAll('img').forEach(img => {
        img.classList.add('clickable-image');
        img.addEventListener('click', () => {
          modal.classList.add('is-visible');
          modalImg.src = img.src;
          downloadBtn.href = img.src;
        });
      });

     modal.addEventListener('click', e => {
       if (e.target === modal) {
         modal.classList.remove('is-visible');
       }
    });
    });
    </script>
